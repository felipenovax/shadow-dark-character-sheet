# Config do projeto Supabase (local dev via Supabase CLI).
# project_id é usado para nomear os containers locais.
project_id = "shadow-dark"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:1234"
additional_redirect_urls = ["http://localhost:5173", "http://localhost:1234", "http://127.0.0.1:1234"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

# Acesso por e-mail + senha, sem confirmação de e-mail (login imediato).
[auth.email]
enable_signup = true
enable_confirmations = false

